    Promise.all(Array.from(document.querySelectorAll('img[id^="sheet-"]')).map(img => {
      return new Promise(resolve => {
        if (img.complete) resolve();
        else { img.onload = img.onerror = resolve; }
      });
    })).then(() => {
      document.querySelectorAll('div[data-sheet]').forEach(a => {
        const c = a.querySelector('canvas');
        const sheet = document.getElementById(a.getAttribute('data-sheet'));
        if (sheet) {
          const ctx = c.getContext('2d');
          ctx.drawImage(sheet, +a.getAttribute('data-x'), +a.getAttribute('data-y'), +a.getAttribute('data-w'), +a.getAttribute('data-h'), 0, 0, 150, 150);
        }
      });
    });
