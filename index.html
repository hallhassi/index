<!DOCTYPE html>
<html>

<head>
    <title>DOOM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background: #000;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: -1;
            pointer-events: none;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        #spacer {
            height: 15000px;
        }
    </style>
</head>

<body>

    <div class="text-container">scroll</div>
    <canvas id="anim-canvas"></canvas>
    <div id="spacer"></div>

    <script>
        const canvas = document.getElementById('anim-canvas');
        const ctx = canvas.getContext('2d');

        const CONFIG = {
            totalFrames: 350,
            perSheet: 50,
            width: 400,
            height: 300
        };

        let loadedBitmaps = {};
        let loadingTracker = {};

        async function init() {
            handleResize();
            await loadInitialFrame();
            window.addEventListener('scroll', () => requestAnimationFrame(render), { passive: true });
            window.addEventListener('resize', handleResize);
        }

        function getSheetUrl(index) {
            return `./output/small_landscape_sheet_${index}.jpg`;
        }

        async function fetchAndDecode(url) {
            if (loadedBitmaps[url]) return loadedBitmaps[url];
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const bitmap = await createImageBitmap(blob);
                loadedBitmaps[url] = bitmap;
                return bitmap;
            } catch (e) {
                delete loadingTracker[url];
                return null;
            }
        }

        async function loadInitialFrame() {
            const url = getSheetUrl(0);
            loadingTracker[url] = true;
            await fetchAndDecode(url);
            render();
        }

        function render() {
            const scrollTop = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = Math.max(0, Math.min(1, scrollTop / (maxScroll || 1)));

            const frameIndex = Math.floor(scrollFraction * (CONFIG.totalFrames - 1));
            const sheetIndex = Math.floor(frameIndex / CONFIG.perSheet);
            const indexInSheet = frameIndex % CONFIG.perSheet;

            preloadSheets(sheetIndex);

            const currentUrl = getSheetUrl(sheetIndex);
            if (loadedBitmaps[currentUrl]) {
                drawFrame(loadedBitmaps[currentUrl], indexInSheet);
            }
        }

        function preloadSheets(currentIndex) {
            [-1, 0, 1].forEach(offset => {
                const targetIndex = currentIndex + offset;
                const totalSheets = Math.ceil(CONFIG.totalFrames / CONFIG.perSheet);
                if (targetIndex < 0 || targetIndex >= totalSheets) return;

                const url = getSheetUrl(targetIndex);
                if (!loadedBitmaps[url] && !loadingTracker[url]) {
                    loadingTracker[url] = true;
                    fetchAndDecode(url).then(() => render());
                }
            });
        }

        function drawFrame(bitmap, index) {
            const scale = Math.max(canvas.width / CONFIG.width, canvas.height / CONFIG.height);
            const drawW = CONFIG.width * scale;
            const drawH = CONFIG.height * scale;
            const offsetX = (canvas.width - drawW) / 2;
            const offsetY = (canvas.height - drawH) / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(
                bitmap,
                index * CONFIG.width, 0, CONFIG.width, CONFIG.height,
                offsetX, offsetY, drawW, drawH
            );
        }

        function handleResize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }

        init();
    </script>
</body>

</html>
